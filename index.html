<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Mother's Day Flower Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="scene" id="scene">
    <div class="glow one"></div>
    <div class="glow two"></div>
    <div class="orchard" aria-hidden="true"></div>

    <div class="card">
      <p class="eyebrow">Happy Mother's Day</p>
      <h1>For Mom</h1>
      <p class="message">
        Thank you for every kindness, every hug, and every beautiful thing you help grow.
        May your day be as bright and full as a garden in bloom.
      </p>
      <div class="hint">Tap anywhere to release petals</div>
    </div>

    <div class="flowers" id="flowers"></div>
    <div class="ground"></div>

    <div class="cta">
      <button id="bloomMore">More Flowers</button>
      <button class="secondary" id="shower">Petal Shower</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
